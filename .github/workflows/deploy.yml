name: Production Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # Gate 1: Verify merged from staging
  check-source:
    name: Verify From Staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check merge source
        run: |
          PARENT=$(git log --pretty=%P -n 1 HEAD | awk '{print $2}')
          if git branch -r --contains $PARENT | grep -q 'origin/staging'; then
            echo "✅ Merged from staging"
          else
            echo "❌ Must merge from staging branch first"
            exit 1
          fi

  # Gate 2: Pre-deploy tests
  pre-deploy-tests:
    name: Quality Gates
    needs: check-source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run test

  # Deploy
  deploy:
    name: Deploy to Production
    needs: pre-deploy-tests
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://marszal-arts.vercel.app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Deploy
        run: npx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - run: sleep 45

  # Gate 3: Smoke tests
  smoke-test:
    name: Smoke Tests
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run smoke tests
        run: |
          BASE_URL=https://marszal-arts.vercel.app \
          ENABLE_REAL_IG_TESTS=true \
            npx playwright test __tests__/e2e/production-smoke.spec.ts
        env:
          CI: true
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}

  # Auto-rollback on failure
  rollback:
    name: Auto Rollback
    needs: smoke-test
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - run: npm install -g vercel
      - name: Rollback to previous
        run: |
          echo "🔄 Rolling back..."
          PREV=$(vercel ls --prod --token=${{ secrets.VERCEL_TOKEN }} | sed -n '2p' | awk '{print $1}')
          vercel promote $PREV --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
