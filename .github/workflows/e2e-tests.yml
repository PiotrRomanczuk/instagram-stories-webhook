        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Generate test images
        run: npx tsx __tests__/e2e/fixtures/generate-test-images.ts

      - name: Setup test environment
        run: |
          cat > .env.local << 'ENVEOF'
          NODE_ENV=test
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_JWT_SECRET=${{ secrets.SUPABASE_JWT_SECRET }}
          NEXTAUTH_URL=http://localhost:3000
          NEXTAUTH_SECRET=${{ secrets.SUPABASE_JWT_SECRET }}
          ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL || 'admin@test.com' }}
          AUTH_GOOGLE_ID=${{ secrets.AUTH_GOOGLE_ID || 'dummy' }}
          AUTH_GOOGLE_SECRET=${{ secrets.AUTH_GOOGLE_SECRET || 'dummy' }}
          AUTH_FACEBOOK_ID=${{ secrets.AUTH_FACEBOOK_ID || 'dummy' }}
          AUTH_FACEBOOK_SECRET=${{ secrets.AUTH_FACEBOOK_SECRET || 'dummy' }}
          FB_APP_SECRET=${{ secrets.FB_APP_SECRET || 'dummy' }}
          NEXT_PUBLIC_FB_APP_ID=${{ secrets.NEXT_PUBLIC_FB_APP_ID || 'dummy' }}
          FB_REDIRECT_URI=${{ secrets.FB_REDIRECT_URI || 'http://localhost:3000/api/auth/link-facebook/callback' }}
          NEXT_PUBLIC_APP_URL=http://localhost:3000
          WEBHOOK_SECRET=${{ secrets.WEBHOOK_SECRET || 'test-webhook-secret' }}
          CRON_SECRET=test-cron-secret
          ENVEOF
          sed -i 's/^[[:space:]]*//' .env.local

      - name: Run Developer Tools tests
        run: npx playwright test developer-tools.spec.ts
        env:
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-developer
          path: test-results/
          retention-days: 7

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-developer
          path: playwright-report/
          retention-days: 7

  # Job 4: Mobile Responsive Tests (37 tests) - RUNS AFTER DEVELOPER
  e2e-mobile:
    name: E2E - Mobile Responsive (37 tests)
    needs: e2e-developer
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
