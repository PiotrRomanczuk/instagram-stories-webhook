name: E2E Tests - Production

on:
  workflow_dispatch:
    inputs:
      deployment_url:
        description: 'Deployment URL to test (leave empty for localhost)'
        required: false
        type: string
  schedule:
    - cron: '0 2 * * *' # Daily at 2 AM UTC

env:
  NODE_VERSION: '20'

jobs:
  e2e-production:
    name: E2E - Production (113 tests, ~10 min)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Generate test images
        run: npx tsx __tests__/e2e/fixtures/generate-test-images.ts

      - name: Setup production environment
        run: |
          cat > .env.local << 'ENVEOF'
          NODE_ENV=production
          VERCEL_ENV=production
          ENABLE_REAL_IG_TESTS=true
          ENABLE_LIVE_IG_PUBLISH=true
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_JWT_SECRET=${{ secrets.SUPABASE_JWT_SECRET }}
          NEXTAUTH_URL=${{ inputs.deployment_url || 'http://localhost:3000' }}
          NEXTAUTH_SECRET=${{ secrets.SUPABASE_JWT_SECRET }}
          ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
          AUTH_GOOGLE_ID=${{ secrets.AUTH_GOOGLE_ID }}
          AUTH_GOOGLE_SECRET=${{ secrets.AUTH_GOOGLE_SECRET }}
          AUTH_FACEBOOK_ID=${{ secrets.AUTH_FACEBOOK_ID }}
          AUTH_FACEBOOK_SECRET=${{ secrets.AUTH_FACEBOOK_SECRET }}
          FB_APP_SECRET=${{ secrets.FB_APP_SECRET }}
          NEXT_PUBLIC_FB_APP_ID=${{ secrets.NEXT_PUBLIC_FB_APP_ID }}
          FB_REDIRECT_URI=${{ secrets.FB_REDIRECT_URI }}
          NEXT_PUBLIC_APP_URL=${{ inputs.deployment_url || 'http://localhost:3000' }}
          WEBHOOK_SECRET=${{ secrets.WEBHOOK_SECRET }}
          CRON_SECRET=${{ secrets.CRON_SECRET }}
          TEST_AUTH_EMAILS=${{ secrets.TEST_AUTH_EMAILS || 'admin@test.com,user@test.com,user2@test.com' }}
          ENVEOF
          sed -i 's/^[[:space:]]*//' .env.local

      - name: Run full production E2E suite
        run: npx playwright test
        env:
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-production
          path: test-results/
          retention-days: 14 # Longer retention for production

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-production
          path: playwright-report/
          retention-days: 14

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}';
            const message = `
            ## 🚨 Production E2E Tests Failed

            **Workflow:** Production E2E Suite (113 tests)
            **Trigger:** ${{ github.event_name === 'schedule' ? 'Scheduled (daily at 2 AM UTC)' : 'Manual trigger' }}
            **Run:** [View Details](${runUrl})

            **Test Coverage:**
            - All 7 E2E test files
            - Real Instagram API publishing tests
            - Mobile responsive tests (5 viewports)
            - Production smoke tests
            - Video preview functionality

            **Action Required:**
            1. Review test results artifact
            2. Check for Instagram API issues
            3. Verify production environment configuration
            4. Fix failing tests before next deployment

            **Common Production Issues:**
            - Instagram API rate limiting
            - OAuth token expiration
            - Database migration drift
            - Environment variable mismatch
            `;

            // Create an issue if this is a scheduled run failure
            if (context.eventName === 'schedule') {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Production E2E Tests Failed - ${new Date().toISOString().split('T')[0]}`,
                body: message,
                labels: ['production', 'e2e', 'automated']
              });
            }
