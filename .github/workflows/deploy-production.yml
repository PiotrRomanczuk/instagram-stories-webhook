name: Deploy to Production

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # ===========================================================================
  # Job 1: Quality Gates (~3-4 min)
  # ===========================================================================
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript check
        run: npx tsc

      - name: Unit tests
        run: npm run test

  # ===========================================================================
  # Job 2: Deploy Preview (~3 min)
  # ===========================================================================
  deploy-preview:
    name: Deploy Preview
    needs: quality-gates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      preview_url: ${{ steps.deploy.outputs.preview_url }}
      deployment_id: ${{ steps.deploy.outputs.deployment_id }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project for preview
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to preview (NOT production)
        id: deploy
        run: |
          # Deploy as preview to get a testable URL before promoting to production.
          # Build target must match deploy target: preview build → preview deploy.
          PREVIEW_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})

          # Trim any trailing whitespace/newlines and take the last line
          PREVIEW_URL=$(echo "$PREVIEW_URL" | tail -1 | tr -d '[:space:]')

          if [ -z "$PREVIEW_URL" ]; then
            echo "Failed to extract preview URL from deployment output"
            exit 1
          fi

          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $PREVIEW_URL"

          # Wait for deployment to be ready
          echo "Waiting for deployment to be ready..."
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$PREVIEW_URL/api/health" || echo "000")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "404" ]; then
              echo "Deployment ready (status: $STATUS)"
              break
            fi
            echo "Attempt $i: status=$STATUS, waiting..."
            sleep 10
          done

  # ===========================================================================
  # Job 3: Promote to Production (~1 min)
  # E2E tests run separately via e2e-preview.yml and e2e-production.yml
  # ===========================================================================
  promote-production:
    name: Promote to Production
    needs: [deploy-preview]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Promote preview to production
        run: |
          PREVIEW_URL="${{ needs.deploy-preview.outputs.preview_url }}"
          echo "Promoting $PREVIEW_URL to production..."

          vercel promote "$PREVIEW_URL" --token=${{ secrets.VERCEL_TOKEN }} --yes

          echo "Production promotion complete"

      - name: Verify production deployment
        run: |
          echo "Waiting for production to update..."
          sleep 15

          # Verify production URL returns 200
          PROD_URL="https://instagram-stories-webhook.vercel.app"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$PROD_URL/api/health" || echo "000")

          if [ "$STATUS" = "200" ] || [ "$STATUS" = "404" ]; then
            echo "Production deployment verified (status: $STATUS)"
          else
            echo "WARNING: Production health check returned status: $STATUS"
            echo "The promotion may still be propagating. Check manually."
          fi

      - name: Notify success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha.substring(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              description: 'Production deployment successful',
              context: 'deploy/production',
              target_url: runUrl
            });

      - name: Notify failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Production promotion failed - ${new Date().toISOString().split('T')[0]}`,
              body: `## Production Promotion Failed\n\n**Commit:** ${context.sha}\n**Run:** [View Details](${runUrl})\n\nThe preview deployment passed E2E tests but promotion to production failed.\n\n**Action Required:**\n1. Check Vercel dashboard\n2. Verify promotion command\n3. Re-run workflow if transient error`,
              labels: ['production', 'automated']
            });
